<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการเข้าใช้งาน - สำนักกฎหมายตรีเทพทนายความ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        .history-page-container {
            background-color: var(--white);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-md);
            max-width: 800px;
            margin: 2rem auto;
        }

        .history-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .history-header h3 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .history-group {
            margin-bottom: 2rem;
        }

        .history-group-title {
            font-size: 1.25rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-card {
            background-color: var(--bg-color);
            border-left: 4px solid var(--accent-orange);
            padding: 1.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }
        
        .history-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .history-date {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .history-type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .type-free {
            background-color: #e8eaf6;
            color: #1a237e;
        }
        
        .type-private {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .history-message {
            color: var(--text-color);
            line-height: 1.5;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 8px;
        }

        .line-login-btn {
            background-color: #00B900;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            font-family: inherit;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .line-login-btn:hover {
            background-color: #009900;
        }

        .empty-history {
            text-align: center;
            padding: 3rem;
            color: #666;
            background: var(--bg-color);
            border-radius: var(--radius-md);
            border: 2px dashed #ccc;
        }

        @media (max-width: 768px) {
            .history-page-container {
                padding: 1.5rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-balance-scale"></i>
                <h2>สำนักกฎหมายตรีเทพทนายความ</h2>
            </div>
        </header>

        <main class="container">
            <div class="history-page-container">
                <div class="history-header">
                    <h3>ประวัติการเข้าใช้งาน</h3>
                    <p>รวบรวมข้อมูลการให้คำปรึกษาของคุณ แยกตามหมวดหมู่คดี</p>
                </div>

                <div id="login-section" class="text-center" style="padding: 2rem 0; text-align: center;">
                    <i class="fab fa-line" style="font-size: 4.5rem; color: #00B900; margin-bottom: 1.5rem;"></i>
                    <h4 style="margin-bottom: 0.5rem; font-size: 1.3rem;">กรุณายืนยันตัวตน</h4>
                    <p style="color: #666; margin-bottom: 2rem;">เข้าสู่ระบบด้วย LINE เพื่อดึงประวัติส่วนตัวของคุณอย่างปลอดภัย</p>
                    <button id="login-btn" class="line-login-btn">
                        <i class="fab fa-line" style="font-size: 1.4rem;"></i> ล็อกอินเพื่อดูประวัติ
                    </button>
                </div>

                <div id="loading-section" class="hidden" style="display: none; padding: 4rem 0; text-align: center; color: var(--primary-color);">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p style="margin-top: 1rem; font-weight: bold;">กำลังดึงข้อมูลอย่างปลอดภัย...</p>
                </div>

                <div id="history-section" class="hidden" style="display: none;">
                    <!-- History groups will be injected here via JS -->
                </div>

                <div class="back-link" style="text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee;">
                    <a href="index.html" style="color: #666; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                        <i class="fas fa-arrow-left"></i> กลับสู่หน้าหลัก
                    </a>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./history.js"></script>
</body>
</html>
