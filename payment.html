<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงินค่าบริการ - สำนักกฎหมายตรีเทพทนายความ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">
        <!-- Main Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-balance-scale"></i>
                <h2>สำนักกฎหมายตรีเทพทนายความ</h2>
            </div>
        </header>

        <main class="container">
            <div class="payment-page-container">
                <div class="payment-header">
                    <h3>ชำระเงินค่าบริการ (ทนายส่วนตัว)</h3>
                    <p>กรุณาชำระเงินเพื่อยืนยันการรับบริการให้คำปรึกษาแบบส่วนตัว</p>
                </div>
                
                <div class="payment-info">
                    <div class="amount-box">
                        ยอดชำระเงิน: <strong>1 บาท</strong>
                    </div>

                    <div class="bank-info-box">
                        <p><strong>ธนาคารไทยพาณิชย์ (SCB)</strong></p>
                        <p>ชื่อบัญชี : สุทธิพจน์ ศรีแสนยงค์</p>
                        <p class="bank-account-no">407-991173-7</p>
                        <span class="verified-badge"><i class="fas fa-check-circle"></i> บัญชีที่สามารถตรวจสอบได้</span>
                    </div>

                    <div class="qr-placeholder" id="qr-container">
                        <div class="qr-box">
                            <img src="./imag/24974.jpg" alt="PromptPay QR">
                            <span>สแกนเพื่อชำระเงินผ่าน QR Code</span>
                        </div>
                    </div>

                    <div class="file-upload-box">
                        <label for="slip-upload">
                            <i class="fas fa-file-upload"></i> แนบหลักฐานการโอนเงิน (สลิป)
                        </label>
                        <input type="file" id="slip-upload" class="file-upload-input" accept="image/*">
                        <div id="upload-status" style="margin-top: 15px; font-weight: bold; text-align: center; display: none;"></div>
                    </div>
                </div>

                <div class="payment-actions">
                    <button id="final-confirm" class="btn-primary" disabled>
                        <i class="fab fa-line"></i> ยืนยันการชำระเงินและติดต่อ Line
                    </button>
                    <button id="cancel-btn" class="btn-outline">
                        ยกเลิกและกลับหน้าหลัก
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script type="module" src="./payment.js"></script>
</body>

</html>
